<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DroidLink Installer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script
      type="module"
      src="https://unpkg.com/esp-web-tools@latest/dist/web/install-button.js"
    ></script>
  </head>
  <body>
    <div class="installer">
      <h1>DroidLink Installer</h1>

      <img
        id="device-logo"
        src="images/R2.png"
        alt="DroidLink Logo"
        class="logo"
      />

      <div class="card">
        <p>Select Firmware</p>

        <div class="firmware-select">
          <button onclick="selectFirmware('MASTER')" id="btn-master">
            Master Controller V1.4
          </button>

          <button onclick="selectFirmware('SLAVE')" id="btn-slave">
            Universal Slave (Stable) V1.2
          </button>

          <button onclick="selectFirmware('SLAVELATEST')" id="btn-slavelatest">
            Universal Slave (Latest) V1.3
          </button>

          <button onclick="selectFirmware('DISPLAY')" id="btn-display">
            Round Display (old)
          </button>
          <button
            onclick="selectFirmware('DISPLAY_AMOLED')"
            id="btn-display_amoled"
          >
            Display AMOLED (watch) V1.3
          </button>

          <button onclick="selectFirmware('SLAVEASTRO')" id="btn-slaveastro">
            AstroPixel Slave (New) V1.2
          </button>
        </div>

        <br />

        <label>
          License Key:
          <input id="license" />
        </label>

        <br /><br />

        <esp-web-install-button id="install" class="install-btn">
          <button slot="activate">Install Firmware</button>
        </esp-web-install-button>
      </div>

      <div class="footer-link">
        <a
          href="https://www.youtube.com/watch?v=jiLfbigjiPc&t=7s"
          target="_blank"
          rel="noopener noreferrer"
        >
          Click Here for Installation Video.
        </a>
      </div>

      <div class="footer-link">
        <a
          href="https://linktr.ee/droidlink"
          target="_blank"
          rel="noopener noreferrer"
        >
          Click Here for Part list
        </a>
      </div>
    </div>

    <script>
      const button = document.getElementById("install");
      let selectedFirmware = null;

      function selectFirmware(type) {
        selectedFirmware = type;

        ["master", "slave", "slavelatest", "display", "display_amoled", "slaveastro"].forEach(
          (id) => {
            document.getElementById("btn-" + id).classList.remove("active");
          },
        );

        document
          .getElementById("btn-" + type.toLowerCase())
          .classList.add("active");

        const logo = document.getElementById("device-logo");

        switch (type) {
          case "MASTER":
            logo.src = "images/master.jpeg";
            break;

          case "SLAVE":
            logo.src = "images/slave.jpeg";
            break;

          case "SLAVELATEST":
            logo.src = "images/slave.jpeg";
            break;

          case "DISPLAY":
            logo.src = "images/display.jpeg";
            break;

          case "DISPLAY_AMOLED":
            logo.src = "images/display_amoled.jpeg";
            break;

          case "SLAVEASTRO":
            logo.src = "images/slave.jpeg";
            break;
        }
      }

      button.addEventListener("click", () => {
        const license = document.getElementById("license").value.trim();

        if (!license) {
          alert("License key required");
          return;
        }

        if (!selectedFirmware) {
          alert("Select firmware type");
          return;
        }

        // Inject license header
        const originalFetch = window.fetch;
        window.fetch = (url, options = {}) => {
          options.headers = {
            ...(options.headers || {}),
            "x-license-key": license,
          };
          return originalFetch(url, options);
        };

        // ✅ FIXED LINE
        button.manifest = `https://droidlink.github.io/DroidLink_Installer/manifest/${selectedFirmware.toLowerCase()}.json`;
      });
    </script>
  </body>
</html>
